<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Журнал успішності</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-color: #4f46e5;
            --bg-soft: #f8fafc;
            --text-muted: #64748b;
        }

        body {
            background: var(--bg-soft);
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background: #fff !important;
            border-bottom: 1px solid #e2e8f0;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }

        .badge {
            border-radius: 8px;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
    </style>
</head>

<body>

<nav class="navbar mb-4">
    <div class="container">
        <span class="fw-bold">Електронний журнал</span>
        <a href="/" class="btn btn-outline-secondary btn-sm">Назад</a>
    </div>
</nav>

<div class="container">

    <div class="card p-4 mb-4">
        <h4 class="fw-bold mb-3">Зведена статистика</h4>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="card p-3 text-center">
                    <small class="text-muted">Середній бал</small>
                    <h3 class="fw-bold text-primary" th:text="${averageGrade}">0</h3>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-3 text-center">
                    <small class="text-muted">Перевірено робіт</small>
                    <h3 class="fw-bold text-primary" th:text="${totalGraded}">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="card p-3">

        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Завдання</th>
                    <th>Відповідь</th>
                    <th class="text-center">Оцінка</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="sub, iter : ${gradedSubmissions}">
                    <td th:text="${iter.count}"></td>

                    <td class="fw-bold" th:text="${sub.assignment.title}"></td>

                    <td class="text-muted text-truncate"
                        style="max-width: 300px;"
                        th:text="${sub.content}"></td>

                    <td class="text-center">
                        <span class="badge bg-success px-3 py-2"
                              th:text="${sub.grade}">
                        </span>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>

    </div>

    <div th:if="${#lists.isEmpty(gradedSubmissions)}" class="text-center py-5">
        <h5 class="text-muted">Журнал порожній</h5>
        <p class="text-muted">Оцініть роботи, щоб вони з’явились тут</p>
    </div>

</div>

</body>
</html>
