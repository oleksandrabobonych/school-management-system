<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-color: #4f46e5;
            --bg-soft: #f8fafc;
            --text-muted: #64748b;
        }

        body {
            background: var(--bg-soft);
            font-family: 'Inter', sans-serif;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: var(--main-color);
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .form-control {
            border-radius: 10px;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card p-4" style="max-width: 420px; width: 100%;">

    <div class="text-center mb-4">
        <div style="font-size:40px;">🏫</div>
        <h4 class="fw-bold">Вхід у систему</h4>
        <p class="text-muted mb-0">Електронний журнал</p>
    </div>

    <form action="/" method="get">

        <div class="mb-3">
            <label class="form-label text-muted small">Логін</label>
            <input type="text" name="username" class="form-control" placeholder="Введіть логін" required>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted small">Пароль</label>
            <input type="password" name="password" class="form-control" placeholder="Введіть пароль" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-2">
            Увійти як вчитель
        </button>

        <a href="/student" class="btn btn-outline-secondary w-100">
            Увійти як учень
        </a>

    </form>

    <div th:if="${param.error}" class="alert alert-danger mt-3 text-center small">
        Невірний логін або пароль
    </div>

    <div th:if="${param.logout}" class="alert alert-success mt-3 text-center small">
        Ви вийшли із системи
    </div>

</div>

</body>
</html>
