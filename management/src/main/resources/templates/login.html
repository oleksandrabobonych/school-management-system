 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід у систему | Електронний Журнал</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">

        <div class="col-md-4">
            <div class="card shadow border-0 border-top border-primary border-4 p-4">

                <div class="text-center mb-4">
                    <h1 class="mb-2">🏫</h1>
                    <h3 class="fw-bold text-primary">Вхід у систему</h3>
                </div>

                <form action="/" method="get">

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">ЛОГІН</label>
                        <input type="text" name="username" class="form-control" placeholder="Введіть ваш логін" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">ПАРОЛЬ</label>
                        <input type="password" name="password" class="form-control" placeholder="Введіть пароль" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">
                        👨‍🏫 Увійти як Вчитель
                    </button>

                    <a href="/student" class="btn btn-outline-primary w-100 fw-bold">
                        🎒 Увійти як Учень
                    </a>

                </form>

                <div th:if="${param.error}" class="alert alert-danger mt-3 small text-center">
                    Невірний логін або пароль
                </div>

                <div th:if="${param.logout}" class="alert alert-success mt-3 small text-center">
                    Ви успішно вийшли із системи
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
