<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель вчителя</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-color: #4f46e5;
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background: var(--bg-soft);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .navbar {
            background: #ffffff !important;
            border-bottom: 1px solid #e2e8f0;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: var(--main-color);
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-outline-danger {
            border-radius: 10px;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--main-color);
            box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
        }

        .badge {
            border-radius: 8px;
            font-weight: 500;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .assignment-card {
            transition: 0.2s;
        }

        .assignment-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar mb-4">
    <div class="container">
        <span class="fw-bold">Панель вчителя</span>

        <div class="d-flex gap-3">
            <a href="/" class="text-decoration-none text-muted">Завдання</a>
            <a href="/journal" class="text-decoration-none text-muted">Журнал</a>
            <a href="/classes" class="text-decoration-none text-muted">Класи</a>
            <a href="/login" class="btn btn-outline-secondary btn-sm">Вийти</a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- CREATE FORM -->
    <div class="card p-4 mb-4">

        <h5 class="fw-bold mb-4">Створити нове завдання</h5>

        <form th:action="@{/add-assignment}" method="post" class="row g-3">

            <div class="col-md-5">
                <input type="text" name="title" class="form-control"
                       placeholder="Предмет та тема" required>
            </div>

            <div class="col-md-4">
                <input type="text" name="description" class="form-control"
                       placeholder="Інструкції" required>
            </div>

            <div class="col-md-2">
                <input type="date" name="deadline" class="form-control" required>
            </div>

            <div class="col-md-1">
                <button type="submit" class="btn btn-primary w-100">
                    +
                </button>
            </div>

        </form>

    </div>

    <h4 class="fw-bold mb-3">Активні завдання</h4>

    <!-- TASKS -->
    <div class="row g-4">

        <div th:each="task : ${assignments}" class="col-md-6">

            <div class="card p-4 assignment-card h-100">

                <h5 class="fw-bold" th:text="${task.title}"></h5>

                <p class="text-muted" th:text="${task.description}"></p>

                <div class="d-flex justify-content-between align-items-center mt-3">

                    <span class="badge bg-light text-dark"
                          th:text="${task.deadline}">
                    </span>

                    <div class="d-flex gap-2">

                        <form th:action="@{/delete-assignment}" method="post">
                            <input type="hidden" name="id" th:value="${task.id}">
                            <button class="btn btn-sm btn-outline-danger">
                                Видалити
                            </button>
                        </form>

                        <a href="/submissions" class="btn btn-primary btn-sm">
                            Відповіді
                            <span class="badge bg-white text-primary ms-1"
                                  th:text="${task.submissions != null ? task.submissions.size() : 0}">
                            </span>
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(assignments)}" class="text-center py-5">
        <h5 class="text-muted">Завдань ще немає</h5>
        <p class="text-muted">Створіть перше завдання</p>
    </div>

</div>

</body>
</html>
