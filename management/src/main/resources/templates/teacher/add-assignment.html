<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Нове завдання</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-color: #4f46e5;
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background: var(--bg-soft);
            font-family: 'Inter', sans-serif;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: var(--main-color);
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
            border-color: var(--main-color);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card p-4" style="max-width: 500px; width: 100%;">

    <h4 class="fw-bold mb-4">
        Нове завдання
    </h4>

    <form th:action="@{/teacher/save}"
          th:object="${assignment}"
          method="post">

        <div class="mb-3">
            <label class="form-label text-muted small">Назва</label>
            <input type="text"
                   th:field="*{title}"
                   class="form-control"
                   placeholder="Наприклад: Квадратні рівняння"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label text-muted small">Опис</label>
            <textarea th:field="*{description}"
                      class="form-control"
                      rows="3"
                      placeholder="Що потрібно зробити..."></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted small">Дедлайн</label>
            <input type="date"
                   th:field="*{deadline}"
                   class="form-control"
                   required>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary w-100">
                Опублікувати
            </button>

            <a href="/teacher" class="btn btn-outline-secondary w-100">
                Назад
            </a>
        </div>

    </form>

</div>

</body>
</html>
