 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Нове завдання</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-6 shadow p-4 rounded bg-light">

        <h2 class="mb-4 text-primary"> Нове завдання</h2>

        <form th:action="@{/teacher/save}"
              th:object="${assignment}"
              method="post">

            <div class="mb-3">
                <label class="form-label">Назва</label>
                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Опис</label>
                <textarea th:field="*{description}"
                          class="form-control"
                          rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Дедлайн</label>
                <input type="date"
                       th:field="*{deadline}"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-success">
                Опублікувати
            </button>

            <a href="/teacher"
               class="btn btn-secondary">
                Назад
            </a>

        </form>
    </div>
</div>

</body>
</html>
