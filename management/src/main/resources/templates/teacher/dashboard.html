<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель вчителя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Панель вчителя</h1>
    <a href="/teacher/add" class="btn btn-primary">+ Нове завдання</a>
</div>

<table class="table table-hover border">
    <thead class="table-light">
    <tr>
        <th>Назва</th>
        <th>Опис</th>
        <th>Дедлайн</th>
        <th>Дії</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${assignments}">
        <td th:text="${a.title}" class="fw-bold"></td>
        <td th:text="${a.description}"></td>
        <td th:text="${a.deadline}"></td>
        <td>
            <a th:href="@{'/teacher/delete/' + ${a.id}}"
               class="btn btn-sm btn-outline-danger">
                🗑 Видалити
            </a>
        </td>
    </tr>
    </tbody>
</table>

<div th:if="${assignments.isEmpty()}"
     class="alert alert-info">
    Завдань поки немає.
</div>

</body>
</html>
