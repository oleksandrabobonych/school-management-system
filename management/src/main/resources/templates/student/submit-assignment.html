<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Здати роботу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>
    📤 Здати роботу:
    <span th:text="${assignment.title}"></span>
</h2>

<form th:action="@{/student/save-submission}"
      method="post"
      class="mt-4">

    <input type="hidden"
           name="assignmentId"
           th:value="${assignment.id}">

    <div class="mb-3">
        <label class="form-label">
            Ваша відповідь
        </label>
        <textarea name="content"
                  class="form-control"
                  rows="5"
                  required></textarea>
    </div>

    <button type="submit"
            class="btn btn-primary">
        Надіслати
    </button>

    <a href="/student"
       class="btn btn-secondary">
        Назад
    </a>

</form>

</body>
</html>
