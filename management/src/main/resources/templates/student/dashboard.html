<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Кабінет учня | Електронний Журнал</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/student">Кабінет Учня</a>
        <div class="d-flex align-items-center">
            <span class="navbar-text text-white me-3">Учень: Бойко Вікторія</span>
            <a href="/login" class="btn btn-outline-light btn-sm fw-bold">Вийти</a>
        </div>
    </div>
</nav>
<div class="container">
    <h2 class="text-primary fw-bold mb-4">Моє навчання</h2>

    <ul class="nav nav-tabs mb-4" id="studentTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold" id="todo-tab" data-bs-toggle="tab" data-bs-target="#todo" type="button" role="tab">
                 Доступні завдання <span class="badge bg-danger ms-1" th:text="${availableAssignments.size()}">0</span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold" id="done-tab" data-bs-toggle="tab" data-bs-target="#done" type="button" role="tab">
                 Мої роботи
            </button>
        </li>
    </ul>

    <div class="tab-content" id="studentTabsContent">

        <div class="tab-pane fade show active" id="todo" role="tabpanel">
            <div class="row g-4">
                <div class="col-md-6" th:each="task : ${availableAssignments}">
                    <div class="card shadow-sm border-0 border-start border-primary border-4 h-100">
                        <div class="card-body p-4">
                            <h4 class="fw-bold" th:text="${task.title}">Назва</h4>
                            <p class="text-muted mb-3" th:text="${task.description}">Опис</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="text-danger small fw-bold"> Дедлайн: <span th:text="${task.deadline}"></span></span>
                                <a th:href="@{/student/submit/{id}(id=${task.id})}" class="btn btn-primary btn-sm px-4">Здати роботу</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(availableAssignments)}">
                    <h4 class="text-muted">Ура! Усі завдання виконано </h4>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="done" role="tabpanel">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Предмет / Завдання</th>
                                <th>Моя відповідь</th>
                                <th class="text-center">Статус / Оцінка</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="sub : ${mySubmissions}">
                                <td class="fw-bold" th:text="${sub.assignment.title}">Математика</td>
                                <td class="text-muted text-truncate" style="max-width: 300px;" th:text="${sub.content}">Текст...</td>
                                <td class="text-center">
                                    <span class="badge bg-warning text-dark px-3 py-2" th:if="${sub.grade == null}">⏳ Очікує перевірки</span>
                                    <span class="badge bg-success fs-6 px-3 py-2" th:if="${sub.grade != null}">Оцінка: <span th:text="${sub.grade}"></span></span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(mySubmissions)}">
                                <td colspan="3" class="text-center py-4 text-muted">Ви ще не здали жодної роботи.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
