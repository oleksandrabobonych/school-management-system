<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Кабінет учня | Електронний Журнал</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-color: #4f46e5;
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background: var(--bg-soft);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background: #ffffff !important;
            border-bottom: 1px solid #e2e8f0;
        }

        .btn-primary {
            background: var(--main-color);
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .nav-tabs .nav-link {
            border: none;
            color: var(--text-muted);
        }

        .nav-tabs .nav-link.active {
            color: var(--main-color);
            border-bottom: 2px solid var(--main-color);
            background: transparent;
        }

        .badge {
            border-radius: 8px;
            font-weight: 500;
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/student">Кабінет учня</a>
        <div class="d-flex align-items-center">
            <span class="me-3 text-muted">Бойко Вікторія</span>
            <a href="/login" class="btn btn-outline-secondary btn-sm">Вийти</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="fw-bold mb-4">Моє навчання</h2>

    <ul class="nav nav-tabs mb-4" id="studentTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#todo">
                Доступні завдання
                <span class="badge bg-secondary ms-1" th:text="${availableAssignments.size()}">0</span>
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link fw-bold" data-bs-toggle="tab" data-bs-target="#done">
                Мої роботи
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ЗАВДАННЯ -->
        <div class="tab-pane fade show active" id="todo">
            <div class="row g-4">
                <div class="col-md-6" th:each="task : ${availableAssignments}">
                    <div class="card p-4 h-100">
                        <h5 class="fw-bold" th:text="${task.title}">Назва</h5>
                        <p class="text-muted mb-3" th:text="${task.description}">Опис</p>

                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <small class="text-muted">
                                Дедлайн: <span th:text="${task.deadline}"></span>
                            </small>
                            <a th:href="@{/student/submit/{id}(id=${task.id})}"
                               class="btn btn-primary btn-sm px-3">
                                Здати
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(availableAssignments)}">
                    <h5 class="text-muted">Усі завдання виконано </h5>
                </div>
            </div>
        </div>

        <!-- РОБОТИ -->
        <div class="tab-pane fade" id="done">
            <div class="card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Завдання</th>
                            <th>Відповідь</th>
                            <th class="text-center">Статус</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="sub : ${mySubmissions}">
                            <td class="fw-bold" th:text="${sub.assignment.title}"></td>

                            <td class="text-muted text-truncate" style="max-width: 300px;"
                                th:text="${sub.content}"></td>

                            <td class="text-center">
                                <span class="badge bg-secondary px-3 py-2"
                                      th:if="${sub.grade == null}">
                                    Очікує
                                </span>

                                <span class="badge bg-success px-3 py-2"
                                      th:if="${sub.grade != null}">
                                    <span th:text="${sub.grade}"></span>
                                </span>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(mySubmissions)}">
                            <td colspan="3" class="text-center py-4 text-muted">
                                Ще немає робіт
                            </td>
                        </tr>
                        </tbody>

                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
