<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Перевірка робіт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
        }

        .navbar {
            background: #fff !important;
            border-bottom: 1px solid #e5e7eb;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-success {
            border-radius: 10px;
        }

        .badge {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<nav class="navbar mb-4">
    <div class="container">
        <span class="fw-bold">Перевірка робіт</span>
        <a href="/" class="btn btn-outline-secondary btn-sm">Назад</a>
    </div>
</nav>

<div class="container">

    <div class="card p-4">

        <h5 class="fw-bold mb-3">Надіслані роботи</h5>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">
                <tr>
                    <th>Завдання</th>
                    <th>Відповідь</th>
                    <th>Оцінка</th>
                    <th>Дія</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="sub : ${submissions}">

                    <td class="fw-bold" th:text="${sub.assignment.title}"></td>

                    <td class="text-muted text-truncate" style="max-width:250px;"
                        th:text="${sub.content}"></td>

                    <td>
                        <span th:if="${sub.grade != null}" class="badge bg-primary"
                              th:text="${sub.grade}"></span>

                        <span th:if="${sub.grade == null}" class="text-muted">—</span>
                    </td>

                    <td>
                        <form th:action="@{/grade-submission}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="submissionId" th:value="${sub.id}">
                            <input type="number" name="grade"
                                   class="form-control form-control-sm"
                                   placeholder="1-12" min="1" max="12" required>

                            <button class="btn btn-success btn-sm">
                                Оцінити
                            </button>
                        </form>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
