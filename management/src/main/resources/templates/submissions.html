<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Перевірка робіт | Панель Вчителя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold"> Перевірка відповідей учнів</span>
        <a href="/" class="btn btn-outline-light btn-sm">Назад до завдань</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
            <h3 class="mb-4 text-dark">Список надісланих робіт</h3>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Завдання</th>
                        <th>Відповідь учня</th>
                        <th style="width: 100px;">Оцінка</th>
                        <th style="width: 200px;">Дія</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sub : ${submissions}">
                        <td class="fw-bold" th:text="${sub.assignment.title}">Назва</td>
                        <td th:text="${sub.content}">Текст роботи...</td>
                        <td>
                            <span th:if="${sub.grade != null}"
                                  class="badge bg-primary fs-6"
                                  th:text="${sub.grade}">12</span>
                            <span th:if="${sub.grade == null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <form th:action="@{/grade-submission}" method="post" class="d-flex gap-2">
                                <input type="hidden" name="submissionId" th:value="${sub.id}">
                                <input type="number" name="grade"
                                       class="form-control form-control-sm"
                                       placeholder="1-12"
                                       min="1" max="12" required>
                                <button type="submit" class="btn btn-sm btn-success px-3">
                                    Оцінити
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(submissions)}" class="text-center py-5">
                <h4 class="text-muted opacity-50">Ніхто ще не здав роботу</h4>
                <p class="text-secondary">Як тільки учні надішлють відповіді, вони з'являться тут.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
