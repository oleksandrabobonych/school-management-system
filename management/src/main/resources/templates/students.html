<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список учнів</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
        }

        .navbar {
            background: #ffffff !important;
            border-bottom: 1px solid #e5e7eb;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }

        .badge {
            border-radius: 8px;
            padding: 6px 10px;
        }

        .btn-success {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav class="navbar mb-4">
    <div class="container">
        <span class="fw-bold">Клас: <span th:text="${className}"></span></span>
        <a href="/classes" class="btn btn-outline-secondary btn-sm">Назад</a>
    </div>
</nav>

<div class="container">

    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Учні класу</h5>

            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addStudentModal">
                + Додати учня
            </button>
        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>ПІБ</th>
                    <th>Email</th>
                    <th>Успішність</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${className == '10-A'}">
                    <td>1</td>
                    <td class="fw-bold">Бойко Іван Васильович</td>
                    <td>boyko.i@school.ua</td>
                    <td><span class="badge bg-success">Відмінник</span></td>
                </tr>

                <tr th:if="${className == '11-B'}">
                    <td>1</td>
                    <td class="fw-bold">Григоренко Софія</td>
                    <td>hryhorenko.s@school.ua</td>
                    <td><span class="badge bg-primary">Добре</span></td>
                </tr>

                <tr th:if="${className == '9-V'}">
                    <td>1</td>
                    <td class="fw-bold">Павленко Артем</td>
                    <td>pavlenko.a@school.ua</td>
                    <td><span class="badge bg-warning text-dark">Потребує уваги</span></td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
